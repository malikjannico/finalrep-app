name: Deploy to Staging

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/775534547890/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@finalrep-app.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      # Build and Deploy Backend API to Cloud Run
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Build Dart Frog Backend
        run: |
          cd backend
          dart pub get
          dart pub global activate dart_frog_cli
          dart pub global run dart_frog_cli:dart_frog build

      - name: Build and Push Docker Image
        run: |
          cd backend
          docker build -t europe-west3-docker.pkg.dev/finalrep-app/finalrep-repo/backend-staging:${{ github.sha }} .dart_frog
          docker push europe-west3-docker.pkg.dev/finalrep-app/finalrep-repo/backend-staging:${{ github.sha }}

      - name: Deploy to Cloud Run Staging
        run: |
          gcloud run deploy backend-staging \
            --image=europe-west3-docker.pkg.dev/finalrep-app/finalrep-repo/backend-staging:${{ github.sha }} \
            --region=europe-west3 \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=finalrep-app:europe-west3:finalrep-db-staging \
            --set-env-vars="DB_SOCKET_PATH=/cloudsql/finalrep-app:europe-west3:finalrep-db-staging,DB_NAME=finalrep_db,DB_USER=app_user,DB_PASS=app_staging_db_password,STORAGE_BUCKET_NAME=finalrep-app-media-staging"

      # Build and Deploy Flutter Web client to Firebase Hosting
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Create env_staging.json from Secret
        run: |
          mkdir -p config
          echo '${{ secrets.ENV_STAGING_JSON }}' > config/env_staging.json

      - name: Build Flutter Web for Staging
        run: |
          flutter build web --release --dart-define-from-file=config/env_staging.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting Staging
        run: |
          firebase deploy --only hosting --project finalrep-app
